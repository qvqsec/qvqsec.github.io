title: "qvq's blog"
name: "qvq"
description: "I yap here about security"
url: "https://qvqsec.github.io"
repository: "qvqsec/qvqsec.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "dark"   # default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

markdown: kramdown
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

author:
  name: "qvq"
  avatar: "/assets/img/buriaaaal.png"
  bio: "CTF Player"
  location: "UK"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://qvqsec.github.io"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/qvqsec"
    - label: "HackTheBox"
      icon: "fab fa-fw fa-flag"
      url: "https://app.hackthebox.com/users/2675386"

# Make every post use the single layout, with author sidebar + reading time
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      toc: true          # table of contents on writeups — handy for long boxes
      toc_sticky: true

include:
  - _pages
