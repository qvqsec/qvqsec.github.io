title: "qvqsec"
name: "qvqsec"
description: "qvqsec"
url: "https://qvqsec.github.io"
repository: "qvqsec/qvqsec.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "dark"   # default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

markdown: kramdown
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

author:
  name: "qvqsec"
  avatar: "/assets/images/avatar.jpg"
  bio: "CTF Player | HackTheBox"
  location: "Wherever you want to show"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://qvqsec.github.io"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/yourhandle"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourhandle"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourhandle"

# Make every post use the single layout, with author sidebar + reading time
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      toc: true          # table of contents on writeups — handy for long boxes
      toc_sticky: true

include:
  - _pages
